});
`;

    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});

const { useState, useEffect } = React;
const ts     = () => new Date().toISOString();
const fDate  = iso => new Date(iso).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
const fTime  = iso => new Date(iso).toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
const fDT    = iso => `${fDate(iso)} ${fTime(iso)}`;
// Journée cuisine : commence à 6h (avant 6h = encore la veille)
const kitchenDay = (d=new Date()) => {
  const dt = new Date(d);
  if(dt.getHours()<6) dt.setDate(dt.getDate()-1);
  dt.setHours(0,0,0,0);
  return dt.toDateString();
};
const todayS = () => kitchenDay();
const sameKDay = (iso) => kitchenDay(new Date(iso))===todayS();
const isOK   = (u,t) => { const v=parseFloat(t); if(isNaN(v)) return null; return u.type==="froid"?v>=u.min&&v<=u.max:v<=u.max; };

const dlCSV = (rows,name) => {
  if(!rows.length) return;
  const h=Object.keys(rows[0]);
  const csv=[h.join(","),...rows.map(r=>h.map(k=>`"${String(r[k]??"").replace(/"/g,'""')}"`).join(","))].join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
  a.download=name; a.click();
};

  const [pwd,setPwd]=useState("");
  const [err,setErr]=useState(false);
  const [show,setShow]=useState(false);
  const try_=()=>{
    if(pwd===APP_PASSWORD){localStorage.setItem("bc_auth","1");onLogin();}
    else{setErr(true);setTimeout(()=>setErr(false),2000);setPwd("");}
  };
  return(
    <div style={{background:"#f8f9fa",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#ffffff",border:"1px solid #e2e8f0",borderRadius:20,padding:36,maxWidth:360,width:"100%",display:"flex",flexDirection:"column",gap:22,boxShadow:"0 4px 32px rgba(0,0,0,.08)"}}>
        <div style={{textAlign:"center"}}>
          <img src={LOGO_B64} alt="The Black Cat" style={{width:160,height:"auto",marginBottom:8}}/>
          <div style={{fontSize:13,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:2}}>HACCP · Traçabilité</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <label style={{fontSize:12,color:"#64748b",textTransform:"uppercase",letterSpacing:1.5,fontWeight:800}}>Mot de passe</label>
          <div style={{position:"relative"}}>
            <input type={show?"text":"password"} value={pwd}
              onChange={e=>{setPwd(e.target.value);setErr(false);}}
              onKeyDown={e=>e.key==="Enter"&&try_()}
              placeholder="Entrer le mot de passe..."
              style={{width:"100%",padding:"14px 48px 14px 16px",fontSize:18,border:`2px solid ${err?"#ef4444":"#1e293b"}`,borderRadius:12,fontFamily:"inherit",letterSpacing:show?1:4,outline:"none",boxSizing:"border-box",background:"#f8fafc",color:"#1e293b"}}
              autoFocus/>
            <button onClick={()=>setShow(!show)} style={{position:"absolute",right:14,top:"50%",transform:"translateY(-50%)",background:"transparent",border:"none",color:"#94a3b8",fontSize:20,cursor:"pointer"}}>
              {show?"🙈":"👁"}
            </button>
          </div>
          {err&&<div style={{fontSize:14,color:"#dc2626",fontWeight:800,textAlign:"center",padding:8,background:"#fef2f2",borderRadius:10}}>❌ Mot de passe incorrect</div>}
        </div>
        <button onClick={try_} style={{background:"#1e293b",color:"#fff",border:"none",padding:18,borderRadius:14,fontFamily:"inherit",fontSize:17,fontWeight:900,cursor:"pointer"}}>
          🔓 Accéder à l'application
        </button>
        <div style={{fontSize:12,color:"#475569",textAlign:"center"}}>Accès réservé à l'équipe The Black Cat</div>
      </div>
    </div>
  );
}

function App(){
  const [authed,setAuthed]=useState(()=>localStorage.getItem("bc_auth")==="1");
  if(!authed) return <LoginScreen onLogin={()=>setAuthed(true)}/>;
  if(!isConfigured) return <SetupScreen/>;
  return <AppMain onLogout={()=>{ localStorage.removeItem("bc_auth"); setAuthed(false); }}/>;
}

function AppMain({onLogout}){

  const [tab,        setTab]       = useState("dash");
  const [autoOpen,   setAutoOpen]  = useState(false);
  const [temps,      setTemps]     = useState([]);
  const [huiles,     setHuiles]    = useState([]);
  const [ncs,        setNcs]       = useState([]);
  const [cellules,   setCellules]  = useState([]);
  const [services,   setServices]  = useState([]);
  const [nettoyages, setNettoyages]= useState([]);
  const [ready,      setReady]     = useState(false);
  const [syncing,    setSyncing]   = useState(false);
  const [fbOk,       setFbOk]      = useState(null);
  const [agents,     setAgents]    = useState(agentsLoad);
  const [fourns,     setFourns]    = useState(fournsLoad);
  const [unites,     setUnites]    = useState(unitesLoad);
  const [pndPlan,    setPndPlan]   = useState(pndLoad);

  useEffect(()=>{
    const pairs=[["temps",setTemps],["huiles",setHuiles],["nc",setNcs],["cellule",setCellules],["service",setServices],["nettoyage",setNettoyages]];
    const unsubs=pairs.map(([k,s])=>dbListen(k,s));
    // Firebase = source de vérité pour les agents
    // On écoute Firebase dès le départ et on écrase toujours le localStorage
    const unsubAgents = (() => {
      if(!db) return ()=>{};
      const ref = db.ref("haccp/agents");
      ref.once("value", snap => {
        try{
          const v = snap.val();
          if(v!=null){
            const parsed = JSON.parse(v);
            if(Array.isArray(parsed) && parsed.length>0){
              setAgents(parsed); // Firebase écrase le localStorage
              localStorage.setItem("bc_agents", JSON.stringify(parsed));
            }
          }
        }catch(e){}
      });
      // Puis écoute en temps réel les changements
      ref.on("value", snap => {
        try{
          const v = snap.val();
          if(v!=null){
            const parsed = JSON.parse(v);
            if(Array.isArray(parsed) && parsed.length>0){
              setAgents(parsed);
              localStorage.setItem("bc_agents", JSON.stringify(parsed));
            }
          }
        }catch(e){}
      });
      return () => ref.off();
    })();
    setReady(true);
    if(db){db.ref(".info/connected").on("value",snap=>{setFbOk(snap.val()===true);});}

    // ── NOTIFICATIONS PUSH ──
    if("Notification" in window && Notification.permission==="default"){
      Notification.requestPermission();
    }
    // Vérification toutes les 15 minutes — envoie une notif si rappel actif
    const checkNotif=()=>{
      if(Notification.permission!=="granted") return;
      const h=new Date().getHours();
      const t=JSON.parse(localStorage.getItem("bc_v2_temps")||"[]");
      const s=JSON.parse(localStorage.getItem("bc_v2_service")||"[]");
      const hu=JSON.parse(localStorage.getItem("bc_v2_huiles")||"[]");
      const ne=JSON.parse(localStorage.getItem("bc_v2_nettoyage")||"[]");
      const tAuj=t.filter(x=>sameKDay(x.ts));
      const sAuj=s.filter(x=>sameKDay(x.ts));
      const huAuj=hu.filter(x=>sameKDay(x.ts));
      const neAuj=ne.filter(x=>sameKDay(x.ts));
      const pndJour=(pndLoad()||PND_DEFAULT).filter(p=>p.freq==="Journalier");
      const pndDone=pndJour.filter(p=>neAuj.some(n=>n.tacheId===p.id));
      const lastNotif=parseInt(localStorage.getItem("bc_last_notif")||"0");
      const now=Date.now();
      if(now-lastNotif<55*60*1000) return; // max 1 notif/heure
      let msg=null;
      if(h>=RAPPEL_OUVERTURE-1&&h<RAPPEL_OUVERTURE+2&&tAuj.length===0)
        msg={title:"🌡 HACCP Black Cat",body:"Relevé T° frigos non effectué ce matin !"};
      else if(h>=RAPPEL_SERVICE-1&&h<RAPPEL_SERVICE+3&&sAuj.length===0)
        msg={title:"🔥 HACCP Black Cat",body:"T° service chaud non contrôlée — à faire avant le service !"};
      else if(h>=RAPPEL_SERVICE-1&&h<RAPPEL_SERVICE+3&&huAuj.length===0)
        msg={title:"⚗ HACCP Black Cat",body:"Contrôle huile friture non fait aujourd'hui !"};
      else if(h>=RAPPEL_CLOTURE-1&&h<RAPPEL_CLOTURE+2&&pndDone.length<pndJour.length)
        msg={title:"🧹 HACCP Black Cat",body:`${pndJour.length-pndDone.length} tâche(s) ménage non validée(s) ce soir !`};
      else if(h>=RAPPEL_CLOTURE-1&&h<RAPPEL_CLOTURE+2&&tAuj.length<2)
        msg={title:"🌡 HACCP Black Cat",body:"2e relevé T° frigos manquant — à faire avant fermeture !"};
      if(msg){
        new Notification(msg.title,{body:msg.body,icon:"/favicon.ico"});
        localStorage.setItem("bc_last_notif",String(now));
      }
    };
    const notifInterval=setInterval(checkNotif,15*60*1000);
    setTimeout(checkNotif,3000); // premier check 3s après ouverture
    return()=>{unsubs.forEach(fn=>fn()); unsubAgents(); unsubFourns(); unsubUnites(); unsubPnd(); clearInterval(notifInterval);};
  },[]);
  const save=async(key,set,data)=>{set(data);lsSave(key,data);setSyncing(true);await dbSave(key,data);setSyncing(false);};
  const saveAgents=(arr)=>{setAgents(arr);agentsSave(arr);};
  const saveFourns=(arr)=>{setFourns(arr);fournsSave(arr);};
  const saveUnites=(arr)=>{setUnites(arr);unitesSave(arr);};
  const savePnd=(arr)=>{setPndPlan(arr);pndSave(arr);};
  const logout=()=>{localStorage.removeItem("bc_auth");setAuthed(false);};

  // Raccourci : navigate + ouvre le formulaire
  const goTo=(t)=>{ setAutoOpen(true); setTab(t); setTimeout(()=>setAutoOpen(false),500); };

  if(!ready) return(
    <div style={{background:"#1e293b",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14}}>
      <div style={{color:"#f59e0b",fontFamily:"monospace",fontSize:20,letterSpacing:2}}>CHARGEMENT…</div>
      <div style={{fontSize:15,color:"#94a3b8"}}>Connexion en cours</div>
    </div>
  );

  const TABS=[
    {id:"dash",      icon:"◉",  short:"Accueil"},
    {id:"temps",     icon:"🌡", short:"Frigos"},
    {id:"service",   icon:"🔥", short:"Chaud"},
    {id:"huiles",    icon:"⚗",  short:"Huile"},
    {id:"cellule",   icon:"❄",  short:"Cellule"},
    {id:"nettoyage", icon:"🧹", short:"Ménage"},
    {id:"nc",        icon:"⚠",  short:"Problème"},
    {id:"settings",  icon:"⚙",  short:"Réglages"},
  ];

  return(
    <div style={{background:"#1e293b",minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap');
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{font-size:18px;}
        .ifield{background:#0f1318;border:2px solid #2d3748;color:#f1f5f9;padding:14px 16px;border-radius:12px;font-family:inherit;font-size:17px;width:100%;}
        .ifield:focus{outline:none;border-color:#f59e0b;}
        .ifield::placeholder{color:#4a5568;}
        .chip{padding:14px 10px;border:2px solid #2d3748;background:transparent;border-radius:12px;color:#718096;font-family:inherit;font-weight:700;font-size:16px;cursor:pointer;transition:all .15s;text-align:center;min-height:52px;}
        .chip.on{border-color:#f59e0b;background:#1a1300;color:#f59e0b;}
        .chip.green{border-color:#22c55e;background:#071810;color:#22c55e;}
        .chip.red{border-color:#ef4444;background:#1a0505;color:#ef4444;}
        .row{border-bottom:1px solid #1a202c;padding:14px 0;}
        .row:last-child{border-bottom:none;}
        .card{background:#0f1318;border:1px solid #1c2130;border-radius:16px;padding:18px;}
        .btnP{background:#f59e0b;color:#0a0c10;border:none;padding:18px;border-radius:14px;font-family:inherit;font-size:18px;font-weight:900;cursor:pointer;width:100%;letter-spacing:.5px;transition:all .15s;min-height:58px;}
        .btnP:disabled{opacity:.35;cursor:not-allowed;}
        .btnP:active{transform:scale(.97);}
        .btnS{background:#0f1318;color:#a0aec0;border:2px solid #2d3748;padding:11px 16px;border-radius:11px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;min-height:46px;}
        .btnEdit{background:transparent;border:1.5px solid #2d3748;color:#718096;padding:8px 12px;border-radius:9px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;min-height:40px;}
        .btnEdit:hover{border-color:#f59e0b;color:#f59e0b;background:#1a1300;}
        .btnDel{background:transparent;border:1.5px solid #1c2130;color:#4a5568;padding:8px 10px;border-radius:9px;font-family:inherit;font-size:14px;cursor:pointer;transition:all .15s;min-height:40px;}
        .btnDel:hover{border-color:#ef4444;color:#ef4444;background:#1a0505;}
        .tabBar{display:flex;background:#0a0c10;border-bottom:2px solid #1a202c;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
        .tabBar::-webkit-scrollbar{display:none;}
        .tabBtn{flex:0 0 auto;padding:10px 14px;background:transparent;border:none;border-bottom:3px solid transparent;color:#4a5568;cursor:pointer;font-family:inherit;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;transition:all .15s;white-space:nowrap;}
        .tabBtn.active{border-bottom-color:#f59e0b;color:#f59e0b;}
        .pulseR{animation:pR 1.5s infinite;}
        @keyframes pR{0%,100%{opacity:1;}50%{opacity:.3;}}
        .overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
        .modal{background:#ffffff;border:1px solid #e2e8f0;border-top:3px solid #f59e0b;border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:22px 18px 44px;}
        .modalHandle{width:44px;height:5px;background:#2d3748;border-radius:3px;margin:0 auto 18px;}
        .pndRow{background:#0f1318;border:2px solid #1c2130;border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s;}
        .pndRow.done{border-color:#22c55e;background:#030d08;}
        .shortcut{display:flex;align-items:center;gap:14px;padding:18px;border-radius:16px;border:none;cursor:pointer;width:100%;font-family:inherit;font-weight:800;font-size:18px;transition:all .15s;min-height:70px;}
        .shortcut:active{transform:scale(.97);}
        select.ifield option{background:#0f1318;}
        textarea.ifield{resize:vertical;}
        ::-webkit-scrollbar{width:4px;}
        ::-webkit-scrollbar-thumb{background:#1c2130;border-radius:2px;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .spin{animation:spin .8s linear infinite;}
        label.fieldLabel{font-size:14px;color:#475569;text-transform:uppercase;letter-spacing:1.5px;display:block;margin-bottom:8px;font-weight:800;}
        .subLabel{font-size:14px;color:#64748b;margin-bottom:10px;line-height:1.5;}
        /* ── LIGHT THEME ── */
        body{background:#f1f5f9 !important;color:#1e293b !important;}
        .ifield{background:#ffffff !important;border:2px solid #cbd5e1 !important;color:#1e293b !important;}
        .ifield:focus{border-color:#f59e0b !important;outline:none;}
        .ifield::placeholder{color:#94a3b8 !important;}
        .chip{border:2px solid #cbd5e1;color:#475569;background:#fff;}
        .chip.on{border-color:#f59e0b !important;background:#fffbeb !important;color:#92400e !important;}
        .chip.green{border-color:#22c55e !important;background:#f0fdf4 !important;color:#15803d !important;}
        .chip.red{border-color:#ef4444 !important;background:#fef2f2 !important;color:#dc2626 !important;}
        .row{border-bottom:1px solid #e2e8f0;}
        .card{background:#ffffff !important;border:1px solid #e2e8f0 !important;box-shadow:0 1px 6px rgba(0,0,0,.07);}
        .btnS{background:#ffffff !important;color:#475569 !important;border:2px solid #cbd5e1 !important;}
        .btnEdit{border:1.5px solid #cbd5e1 !important;color:#64748b !important;background:#fff !important;}
        .btnEdit:hover{border-color:#f59e0b !important;color:#92400e !important;background:#fffbeb !important;}
        .btnDel{border:1.5px solid #fecaca !important;color:#ef4444 !important;background:#fff !important;}
        .btnDel:hover{border-color:#dc2626 !important;background:#fef2f2 !important;}
        .tabBar{background:#ffffff !important;border-bottom:2px solid #e2e8f0 !important;}
        .tabBtn{color:#64748b !important;}
        .tabBtn.active{border-bottom-color:#f59e0b !important;color:#92400e !important;}

        .modalHandle{background:#e2e8f0 !important;}
        .pndRow{background:#ffffff !important;border:2px solid #e2e8f0 !important;}
        .pndRow.done{border-color:#22c55e !important;background:#f0fdf4 !important;}
        select.ifield option{background:#ffffff !important;color:#1e293b !important;}
        ::-webkit-scrollbar-thumb{background:#cbd5e1 !important;}
        /* Forcer tous les textes principaux à être lisibles */
        .card *:not(button):not(input):not(select):not(textarea){ color: inherit; }
      `}</style>

      {/* HEADER */}
      <div style={{background:"#ffffff",borderBottom:"2px solid #e2e8f0",padding:"12px 18px",position:"sticky",top:0,zIndex:100,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 1px 8px rgba(0,0,0,.06)"}}>
        <div>
          <div style={{fontSize:11,color:"#94a3b8",letterSpacing:3,textTransform:"uppercase",fontWeight:700,background:"#ffffff"}}>HACCP · Traçabilité</div>
          <div style={{fontSize:24,fontWeight:900,color:"#1e293b",lineHeight:1.1,letterSpacing:.5}}>{RESTAURANT}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {syncing&&<div className="spin" style={{width:16,height:16,border:"2.5px solid #e2e8f0",borderTopColor:"#f59e0b",borderRadius:"50%"}}/>}
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:fbOk===true?"#22c55e":fbOk===false?"#ef4444":"#f59e0b"}}/>
            <span style={{fontSize:10,color:fbOk===true?"#22c55e":fbOk===false?"#ef4444":"#f59e0b",fontWeight:800}}>{fbOk===true?"SYNC":fbOk===false?"LOCAL":"..."}</span>
          </div>
          <Clock/>
        </div>
      </div>

      {/* TABS */}
      <div className="tabBar" style={{position:"sticky",top:58,zIndex:99}}>
        {TABS.map(t=>(
          <button key={t.id} className={`tabBtn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>
            <div style={{fontSize:18,lineHeight:1,marginBottom:2}}>{t.icon}</div>
            <div>{t.short}</div>
          </button>
        ))}
      </div>

      {/* CONTENT */}
      <div style={{padding:"16px 16px 60px"}}>
        {tab==="dash"      && <Dashboard temps={temps} huiles={huiles} ncs={ncs} cellules={cellules} services={services} nettoyages={nettoyages} onShortcut={goTo}/>}
        {tab==="temps"     && <ModuleTemps    temps={temps}        agents={agents} unites={unites} autoOpen={autoOpen} onSave={d=>save("temps",    setTemps,    d)}/>}
        {tab==="service"   && <ModuleService  services={services}  agents={agents} onSave={d=>save("service",  setServices, d)}/>}
        {tab==="huiles"    && <ModuleHuiles   huiles={huiles}      agents={agents} onSave={d=>save("huiles",   setHuiles,   d)}/>}
        {tab==="cellule"   && <ModuleCellule  cellules={cellules}  agents={agents} onSave={d=>save("cellule",  setCellules, d)}/>}
        {tab==="nettoyage" && <ModuleNettoyage nettoyages={nettoyages} agents={agents} pndPlan={pndPlan} autoOpen={autoOpen} onSave={d=>save("nettoyage",setNettoyages,d)}/>}
        {tab==="nc"        && <ModuleNC       ncs={ncs}            agents={agents} autoOpen={autoOpen} onSave={d=>save("nc",       setNcs,      d)}/>}
        {tab==="settings"  && <ModuleSettings agents={agents} onSaveAgents={saveAgents} fourns={fourns} onSaveFourns={saveFourns} unites={unites} onSaveUnites={saveUnites} pndPlan={pndPlan} onSavePnd={savePnd} onLogout={logout}/>}
      </div>
    </div>
  );
}

function Clock(){
  const [t,setT]=useState(new Date());
  useEffect(()=>{const i=setInterval(()=>setT(new Date()),15000);return()=>clearInterval(i);},[]);
  return(
    <div style={{textAlign:"right"}}>
      <div style={{fontSize:12,color:"#94a3b8",fontWeight:600}}>{t.toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit",month:"short"})}</div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:19,fontWeight:700,color:"#1e293b",lineHeight:1}}>
        {t.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}
      </div>
    </div>
  );
}

// ── Helpers export CSV mensuel ──
const buildCSV=(rows,cols,maps)=>{
  if(!rows.length) return null;
  const csv=[cols.join(","),...rows.map(r=>cols.map(k=>`"${String((maps[k]?.(r))??"").replace(/"/g,'""')}"`).join(","))].join("\n");
  return "\uFEFF"+csv;
};
const dlAll=(temps,huiles,services,cellules,ncs)=>{
  const moisPrec=new Date(); moisPrec.setDate(0); // dernier jour mois précédent
  const mois=new Date(moisPrec.getFullYear(),moisPrec.getMonth(),1).toISOString().slice(0,7);
  const inM=(iso)=>iso&&(iso.startsWith(mois));
  const nomMois=new Date(moisPrec.getFullYear(),moisPrec.getMonth(),1).toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
  [
    [temps.filter(t=>inM(t.ts)),
     ["Date","Heure","Unité","Temp (°C)","Conforme","Agent","Note"],
     {Date:r=>fDate(r.ts),Heure:r=>fTime(r.ts),"Unité":r=>r.unite,"Temp (°C)":r=>r.temp,Conforme:r=>r.ok?"OUI":"NON",Agent:r=>r.agent,Note:r=>r.note||""},
     `temperatures_${mois}.csv`],
    [services.filter(s=>inM(s.ts)),
     ["Date","Heure","Poste","Plat","Temp (°C)","Conforme (≥63°C)","Agent"],
     {Date:r=>fDate(r.ts),Heure:r=>fTime(r.ts),Poste:r=>r.poste,Plat:r=>r.plat||"—","Temp (°C)":r=>r.temp,"Conforme (≥63°C)":r=>r.ok?"OUI":"NON",Agent:r=>r.agent},
     `service_chaud_${mois}.csv`],
    [huiles.filter(h=>inM(h.ts)),
     ["Date","Heure","Friteuse","TPM (%)","Couleur","Odeur","Mousse","Décision","Agent"],
     {Date:r=>fDate(r.ts),Heure:r=>fTime(r.ts),Friteuse:r=>r.friteuse,"TPM (%)":r=>r.tpm,Couleur:r=>r.col,Odeur:r=>r.odeur,Mousse:r=>r.mousse,"Décision":r=>r.decision,Agent:r=>r.agent},
     `huiles_${mois}.csv`],
    [cellules.filter(c=>inM(c.tsDebut)&&c.statut==="terminé"),
     ["Date","Début","Fin","Produit","Qté","T° départ","T° fin","Durée (min)","Conforme","Agent"],
     {Date:r=>fDate(r.tsDebut),"Début":r=>fTime(r.tsDebut),Fin:r=>r.tsFin?fTime(r.tsFin):"—",Produit:r=>r.produit,"Qté":r=>r.qte||"—","T° départ":r=>r.tDepart,"T° fin":r=>r.tFin||"—","Durée (min)":r=>r.dureeMin||"—",Conforme:r=>r.ok?"OUI":"NON",Agent:r=>r.agent},
     `cellule_${mois}.csv`],
    [ncs.filter(n=>inM(n.ts)),
     ["Date","Heure","Catégorie","Description","Action corrective","Agent","Statut"],
     {Date:r=>fDate(r.ts),Heure:r=>fTime(r.ts),"Catégorie":r=>r.categorie,Description:r=>r.description,"Action corrective":r=>r.action||"",Agent:r=>r.agent,Statut:r=>r.statut},
     `nonconformites_${mois}.csv`],
  ].forEach(([rows,cols,maps,name])=>{
    const csv=buildCSV(rows,cols,maps);
    if(!csv) return;
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
    a.download=name; a.click();
  });
  // Ouvrir le mail après 2s (laisser le temps aux téléchargements)
  setTimeout(()=>{
    const sujet=encodeURIComponent(`HACCP The Black Cat — Relevés ${nomMois}`);
    const corps=encodeURIComponent(
      `Bonjour,\n\nVeuillez trouver ci-joint les relevés HACCP du mois de ${nomMois}.\n\n`+
      `Fichiers joints :\n• Températures frigos/congélos\n• Températures service chaud\n`+
      `• Contrôles huiles friture\n• Cycles cellule de refroidissement\n`+
      `• Non-conformités\n\nCordialement,\nThe Black Cat`
    );
    window.location.href=`mailto:${EMAIL_1},${EMAIL_2}?subject=${sujet}&body=${corps}`;
  },2000);
};

function Dashboard({temps,huiles,ncs,cellules,services,nettoyages,onShortcut}){
  const today=todayS();
  const heure=new Date().getHours();
  const tAuj=temps.filter(t=>sameKDay(t.ts));
  const hAuj=huiles.filter(h=>sameKDay(h.ts));
  const cAuj=cellules.filter(c=>sameKDay(c.tsDebut));
  const sAuj=services.filter(s=>sameKDay(s.ts));
  const ncOpen=ncs.filter(n=>n.statut==="Ouvert");
  const tKO=tAuj.filter(t=>t.ok===false);
  const hKO=hAuj.filter(h=>{
    if(h.decision!=="Changement immédiat"||h.type==="changement") return false;
    return !huiles.some(x=>x.type==="changement"&&x.friteuse===h.friteuse&&new Date(x.ts)>new Date(h.ts));
  });
  const cKO=cAuj.filter(c=>c.statut==="terminé"&&c.ok===false);
  const sKO=sAuj.filter(s=>s.ok===false);
  const nAuj=nettoyages.filter(n=>sameKDay(n.ts));
  const PND_PLAN_DASH=pndLoad();
  const pndJour=PND_PLAN_DASH.filter(p=>p.freq==="Journalier");
  const pndDone=pndJour.filter(p=>nAuj.some(n=>n.tacheId===p.id));
  const pndPct=pndJour.length>0?Math.round(pndDone.length/pndJour.length*100):100;

  // ── SERVICES MIDI/SOIR — Dimanche = soir seulement ──
  const jourSemaine=new Date().getDay();

  const isMidi=(iso)=>{ const h=new Date(iso).getHours(); return h>=10&&h<15; };

      {/* ── RAPPELS CONTEXTUELS ── */}
      {rappels.length>0&&rappels.map((r,i)=>(

// MODULE TEMPÉRATURES FROIDS
// ══════════════════════════════════════════════
function ModuleTemps({temps,onSave,autoOpen,agents,unites:unitesProp}){
  const [mode,setMode]=useState("saisie");
  const UNITES_INIT=unitesLoad(); const [uid,setUid]=useState(UNITES_INIT[0]?.id||"saladette");
  const [temp,setTemp]=useState("");
  const [agent,setAgent]=useState((agents||AGENTS_DEFAULT)[0]);
  const [note,setNote]=useState("");
  const [flash,setFlash]=useState(null);
  const [edit,setEdit]=useState(null);

  useEffect(()=>{ if(autoOpen) setMode("saisie"); },[autoOpen]);
  useEffect(()=>{ if(agents&&agents.length) setAgent(agents[0]); },[agents]);

  const UNITES=unitesProp||UNITES_DEFAULT;
  const u=UNITES.find(x=>x.id===uid)||UNITES[0];
  const ok=temp!==""?isOK(u,temp):null;
  const tAuj=temps.filter(t=>sameKDay(t.ts));

  const nextUnit=()=>{
    const idx=UNITES.findIndex(x=>x.id===uid);
    setUid(UNITES[(idx+1)%UNITES.length].id);
  };
  const submit=async()=>{
    if(!temp) return;
    await onSave([...temps,{id:Date.now(),ts:ts(),unite:u.label,uid:u.id,type:u.type,temp:parseFloat(temp),ok,agent,note}]);
    const wasOk=ok; setTemp(""); setNote("");
    setFlash(wasOk?"ok":"nc");
    setTimeout(()=>{ setFlash(null); nextUnit(); },1600);
  };
  const saveEdit=async(upd)=>{ await onSave(temps.map(t=>t.id===upd.id?upd:t)); setEdit(null); };
  const del=async(id)=>{ if(window.confirm("Supprimer ce relevé ?")) await onSave(temps.filter(t=>t.id!==id)); };
  const csv=()=>dlCSV(temps.map(t=>({"Date":fDate(t.ts),"Heure":fTime(t.ts),"Unité":t.unite,"Temp (°C)":t.temp,"Conforme":t.ok?"OUI":"NON","Agent":t.agent,"Note":t.note||""})),`temperatures_${new Date().toISOString().slice(0,10)}.csv`);

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <R2><span style={{fontSize:28,fontWeight:900,color:"#1e293b"}}>🌡 Températures frigos</span><button className="btnS" onClick={csv}>↓ CSV</button></R2>
      <TBar opts={[{id:"saisie",label:"📝 Saisir"},{id:"hist",label:`📋 Historique (${temps.length})`}]} active={mode} onChange={setMode}/>

      {mode==="saisie"&&(
        <div className="card" style={{display:"flex",flexDirection:"column",gap:16}}>
          <FB label="Quelle unité ?">
            <select className="ifield" value={uid} onChange={e=>setUid(e.target.value)}>
              {UNITES.map(u=><option key={u.id} value={u.id}>{u.label} — cible : {u.type==="froid"?`${u.min} à ${u.max}°C`:`max ${u.max}°C`}</option>)}
            </select>
          </FB>
          <FB label="Température relevée (°C)">
            <input type="number" step="0.1" className="ifield" value={temp} onChange={e=>setTemp(e.target.value)}
              placeholder={u.type==="froid"?"ex. 2.5":"ex. -20"}
              style={{fontSize:42,fontFamily:"'JetBrains Mono',monospace",textAlign:"center",fontWeight:700,padding:"18px",
                borderColor:ok===false?"#ef4444":ok===true?"#22c55e":"#1e293b",

  const [mousse,setMousse]=useState(item.mousse); const [agent,setAgent]=useState(item.agent);
  const d=huileDecision(tpm,col,odeur,mousse);
  return(<>
    <FB label="Friteuse"><ChipR opts={["Friteuse 1","Friteuse 2"]} active={frit} onChange={setFrit}/></FB>
    <FB label="TPM (%)"><input type="number" step="1" className="ifield" value={tpm} onChange={e=>setTpm(e.target.value)} style={{fontSize:32,fontFamily:"'JetBrains Mono',monospace",textAlign:"center",fontWeight:700,borderColor:!tpm?"#e2e8f0":parseFloat(tpm)<=25?"#22c55e":"#ef4444"}}/></FB>
    <FB label="Couleur"><div style={{display:"flex",gap:5}}>{COULEURS.map(c=><button key={c.v} onClick={()=>setCol(c.v)} style={{flex:1,padding:"8px 2px",border:`3px solid ${col===c.v?"#f59e0b":"#e2e8f0"}`,background:c.bg,borderRadius:9,cursor:"pointer",fontSize:10,fontWeight:800,color:c.txt,textAlign:"center",lineHeight:1.3,minHeight:48}}>{c.v}<br/>{c.label}</button>)}</div></FB>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <FB label="Odeur"><div style={{display:"flex",flexDirection:"column",gap:6}}>{["OK","Rance","Brûlée"].map(o=><button key={o} onClick={()=>setOdeur(o)} className={`chip${odeur===o?(o==="OK"?" green":" red"):""}`}>{o}</button>)}</div></FB>
      <FB label="Mousse"><div style={{display:"flex",flexDirection:"column",gap:6}}>{["Non","Oui"].map(v=><button key={v} onClick={()=>setMousse(v)} className={`chip${mousse===v?(v==="Non"?" green":" red"):""}`}>{v}</button>)}</div></FB>
    </div>
    <FB label="Agent"><ChipR opts={agents||AGENTS_DEFAULT} active={agent} onChange={setAgent}/></FB>
    {d&&<DecBanner d={d}/>}
    <SC onSave={()=>onSave({...item,friteuse:frit,tpm:parseFloat(tpm),col,odeur,mousse,decision:d,agent})} onClose={onClose} disabled={!tpm}/>
  </>);
}

// MODULE CELLULE
// ══════════════════════════════════════════════
function ModuleCellule({cellules,onSave,agents}){
  const [mode,setMode]=useState("saisie"); const [produit,setProduit]=useState(PRODUITS_CELLULE[0]);
  const [produitLib,setProdLib]=useState(""); const [qte,setQte]=useState(""); const [lot,setLot]=useState("");
  const [tDepart,setTDepart]=useState(""); const [tFin,setTFin]=useState("");
  const [agent,setAgent]=useState((agents||AGENTS_DEFAULT)[0]); const [flash,setFlash]=useState(false);
  const [pendingId,setPending]=useState(null); const [edit,setEdit]=useState(null);
  const calcOk=(tf,tsD,tsF)=>{ const t=parseFloat(tf); if(isNaN(t)) return null; if(!tsD||!tsF) return t<=10; return t<=10&&(new Date(tsF)-new Date(tsD))/60000<=120; };
  const calcDuree=(tsD,tsF)=>(!tsD||!tsF)?null:Math.round((new Date(tsF)-new Date(tsD))/60000);
  const demarrer=async()=>{
    if(!tDepart) return;
    const id=Date.now(); const lib=produit==="Autre"?produitLib:produit;
    await onSave([...cellules,{id,tsDebut:ts(),tsFin:null,produit:lib,qte,lot,tDepart:parseFloat(tDepart),tFin:null,dureeMin:null,ok:null,statut:"en_cours",agent}]);
    setPending(id); setFlash("started"); setTimeout(()=>setFlash(false),2500);
  };
  const cycleActifId=pendingId||(cellules.find(c=>c.statut==="en_cours")?.id||null);
  const terminer=async()=>{
    if(!tFin||!cycleActifId) return;
    const now=ts();
    await onSave(cellules.map(c=>{ if(c.id!==cycleActifId) return c; const dureeMin=calcDuree(c.tsDebut,now); return {...c,tsFin:now,tFin:parseFloat(tFin),dureeMin,ok:calcOk(tFin,c.tsDebut,now),statut:"terminé"}; }));
    setPending(null); setTDepart(""); setTFin(""); setQte(""); setProdLib(""); setLot(""); setFlash("done"); setTimeout(()=>setFlash(false),3000);
  };
  const saveEdit=async(upd)=>{ await onSave(cellules.map(c=>c.id===upd.id?upd:c)); setEdit(null); };
  const del=async(id)=>{ if(window.confirm("Supprimer ce cycle ?")) await onSave(cellules.filter(c=>c.id!==id)); };
  const cycleEnCours=cellules.find(c=>c.statut==="en_cours");
  const activePending=cycleActifId?cellules.find(c=>c.id===cycleActifId):null;
  const okPreview=tFin?parseFloat(tFin)<=10:null;
  const termines=cellules.filter(c=>c.statut==="terminé");
  const csv=()=>dlCSV(termines.map(c=>({"Date":fDate(c.tsDebut),"Début":fTime(c.tsDebut),"Fin":c.tsFin?fTime(c.tsFin):"—","Produit":c.produit,"Qté":c.qte||"—","T° départ":c.tDepart,"T° fin":c.tFin||"—","Durée (min)":c.dureeMin||"—","Conforme":c.ok===true?"OUI":c.ok===false?"NON":"—","Agent":c.agent})),`cellule_${new Date().toISOString().slice(0,10)}.csv`);
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <R2><span style={{fontSize:28,fontWeight:900,color:"#1e293b"}}>❄ Cellule de refroidissement</span><button className="btnS" onClick={csv}>↓ CSV</button></R2>
      <div style={{background:"#f0f7ff",border:"1px solid #93c5fd",borderRadius:12,padding:"12px 14px",fontSize:15,color:"#1e293b",lineHeight:1.7,fontWeight:600}}>
        ⚖️ <b>Règle HACCP :</b> de <b>+63°C → ≤ +10°C</b> en moins de <b>2 heures</b>
      </div>
      {cycleEnCours&&(
        <div style={{background:"#f0fdf4",border:"3px solid #22c55e",borderRadius:16,padding:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,marginBottom:8}}>
            <div style={{color:"#16a34a",fontWeight:900,fontSize:15,textTransform:"uppercase",letterSpacing:1}}>❄ Cycle en cours — Tecnodom BSF ATT05</div>
            <button onClick={()=>del(cycleEnCours.id)} style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,color:"#dc2626",fontFamily:"inherit",fontSize:13,fontWeight:700,padding:"6px 10px",cursor:"pointer",flexShrink:0,minHeight:36}}>✕ Supprimer</button>
          </div>
          <div style={{fontSize:18,color:"#1e293b",fontWeight:700}}>{cycleEnCours.produit}{cycleEnCours.qte&&` · ${cycleEnCours.qte}`}</div>
          <div style={{fontSize:14,color:"#94a3b8",marginTop:4}}>Démarré {fDT(cycleEnCours.tsDebut)} · T° départ : <b style={{color:"#92400e",fontSize:17}}>{cycleEnCours.tDepart}°C</b> · {cycleEnCours.agent}</div>
          <Timer tsDebut={cycleEnCours.tsDebut}/>
        </div>
      )}
      <TBar opts={[{id:"saisie",label:"▶ Nouveau cycle"},{id:"hist",label:`📋 Historique (${termines.length})`}]} active={mode} onChange={setMode}/>
      {mode==="saisie"&&(
        <div className="card" style={{display:"flex",flexDirection:"column",gap:16}}>
          {!activePending?(
            <>
              <FB label="Quel produit ?">
                <select className="ifield" value={produit} onChange={e=>setProduit(e.target.value)}>{PRODUITS_CELLULE.map(p=><option key={p} value={p}>{p}</option>)}</select>
                {produit==="Autre"&&<input className="ifield" style={{marginTop:10}} value={produitLib} onChange={e=>setProdLib(e.target.value)} placeholder="Préciser..."/>}
              </FB>
              <FB label="Quantité (facultatif)"><input className="ifield" value={qte} onChange={e=>setQte(e.target.value)} placeholder="ex. 2 kg, 1 bac GN"/></FB>
              <FB label="N° de lot (facultatif)" sub="Numéro sur l'emballage — à noter avant de jeter">
                <input className="ifield" value={lot} onChange={e=>setLot(e.target.value)} placeholder="ex. L240315, FR 34.xxx"/>
              </FB>
              <FB label="Température à cœur au départ (°C)" sub="Enfoncer la sonde au centre du produit — doit idéalement être ≥ 63°C">
                <input type="number" step="0.5" className="ifield" value={tDepart} onChange={e=>setTDepart(e.target.value)} placeholder="ex. 72"
                  style={{fontSize:42,fontFamily:"'JetBrains Mono',monospace",textAlign:"center",fontWeight:700,padding:"18px",
                    borderColor:tDepart&&parseFloat(tDepart)>=63?"#22c55e":tDepart?"#f59e0b":"#1e293b"}}/>
                {tDepart&&parseFloat(tDepart)<63&&<div style={{fontSize:14,color:"#92400e",marginTop:6,fontWeight:700}}>⚠ En-dessous de 63°C — noter l'heure de début si refroidissement déjà commencé</div>}
              </FB>
              <FB label="Agent"><ChipR opts={agents||AGENTS_DEFAULT} active={agent} onChange={setAgent}/></FB>
              <button className="btnP" onClick={demarrer} disabled={!tDepart||(produit==="Autre"&&!produitLib)} style={{background:"#22c55e",color:"#f0fdf4"}}>
                {flash==="started"?"✅ Cycle démarré !":"❄ Démarrer le cycle de refroidissement"}
              </button>
            </>
          ):(
            <>
              <div style={{background:"#f0fdf4",border:"2px solid #22c55e",borderRadius:12,padding:"14px 16px"}}>
                <div style={{fontSize:13,color:"#16a34a",fontWeight:800,textTransform:"uppercase",letterSpacing:.8,marginBottom:6}}>Cycle actif</div>
                <div style={{fontWeight:700,fontSize:17}}>{activePending.produit}</div>
                <div style={{fontSize:14,color:"#94a3b8",marginTop:4}}>Démarré : {fTime(activePending.tsDebut)} · T° départ : {activePending.tDepart}°C</div>
                <Timer tsDebut={activePending.tsDebut}/>
              </div>
              <FB label="Température à cœur en fin de cycle (°C)" sub="Ressonder au centre du produit — doit être ≤ +10°C">
                <input type="number" step="0.5" className="ifield" value={tFin} onChange={e=>setTFin(e.target.value)} placeholder="Objectif ≤ 10°C"
                  style={{fontSize:42,fontFamily:"'JetBrains Mono',monospace",textAlign:"center",fontWeight:700,padding:"18px",
                    borderColor:okPreview===true?"#22c55e":okPreview===false?"#ef4444":"#1e293b"}}/>
              </FB>
              {tFin&&<ConfBanner ok={okPreview} detail="" bad="→ Prolonger le cycle · Si plus de 2h écoulées : ouvrir une NC" good="→ Étiqueter le bac : produit + date + DLC · Transférer au froid ou congélation"/>}
              <div style={{display:"flex",gap:12}}>
                <button onClick={()=>setPending(null)} style={{flex:1,padding:"14px",background:"transparent",border:"2px solid #2d3748",borderRadius:12,color:"#64748b",fontFamily:"inherit",fontSize:16,cursor:"pointer",fontWeight:700}}>← Retour</button>
                <button className="btnP" style={{flex:2}} onClick={terminer} disabled={!tFin||!cycleActifId}>{flash==="done"?"✅ Cycle enregistré !":"💾 Clôturer le cycle"}</button>
              </div>
            </>
          )}
        </div>
      )}
      {mode==="hist"&&(
        <div className="card">
          {termines.length===0?<Empty/>:termines.slice().reverse().map(c=>(
            <div key={c.id} className="row" style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}><Dot ok={c.ok}/><span style={{fontSize:15,fontWeight:700}}>{c.produit}</span>{c.qte&&<span style={{color:"#64748b",fontSize:13}}>· {c.qte}</span>}</div>
                <div style={{fontSize:13,color:"#94a3b8"}}>{fDate(c.tsDebut)} · {fTime(c.tsDebut)}→{c.tsFin?fTime(c.tsFin):"?"} · {c.agent}</div>
                <div style={{fontSize:13,color:"#64748b",marginTop:2}}>Départ <b style={{color:"#92400e"}}>{c.tDepart}°C</b> → Fin <b style={{color:c.ok?"#22c55e":"#ef4444"}}>{c.tFin}°C</b>{c.dureeMin!=null&&<span style={{color:c.dureeMin<=120?"#22c55e":"#ef4444"}}> · {c.dureeMin}min{c.dureeMin>120&&" ⚠ >2h"}</span>}</div>
              </div>
              <ABtns onEdit={()=>setEdit(c)} onDel={()=>del(c.id)}/>
            </div>
          ))}
        </div>
      )}
      {edit&&<Modal title="✏️ Modifier cycle cellule" onClose={()=>setEdit(null)}><EditCellule item={edit} agents={agents} onSave={saveEdit} onClose={()=>setEdit(null)}/></Modal>}
    </div>
  );
}
function EditCellule({item,onSave,onClose,agents}){
  const [produit,setProduit]=useState(item.produit); const [qte,setQte]=useState(item.qte||"");
  const [tDepart,setTDepart]=useState(String(item.tDepart)); const [tFin,setTFin]=useState(item.tFin!=null?String(item.tFin):"");
  const [agent,setAgent]=useState(item.agent);
  const dureeMin=item.tsDebut&&item.tsFin?Math.round((new Date(item.tsFin)-new Date(item.tsDebut))/60000):item.dureeMin;
  const tFinV=parseFloat(tFin); const ok=tFin?(tFinV<=10&&(dureeMin??0)<=120):null;
  return(<>
    <FB label="Produit"><input className="ifield" value={produit} onChange={e=>setProduit(e.target.value)}/></FB>
    <FB label="Quantité"><input className="ifield" value={qte} onChange={e=>setQte(e.target.value)}/></FB>
    <FB label="T° départ (°C)"><input type="number" step="0.5" className="ifield" value={tDepart} onChange={e=>setTDepart(e.target.value)} style={{fontSize:28,fontFamily:"'JetBrains Mono',monospace",textAlign:"center",fontWeight:700}}/></FB>
    <FB label="T° fin (°C)"><input type="number" step="0.5" className="ifield" value={tFin} onChange={e=>setTFin(e.target.value)} style={{fontSize:28,fontFamily:"'JetBrains Mono',monospace",textAlign:"center",fontWeight:700,borderColor:ok===true?"#22c55e":ok===false?"#ef4444":"#e2e8f0"}}/></FB>
    {dureeMin!=null&&<div style={{fontSize:14,color:"#94a3b8",fontWeight:700}}>Durée calculée : <b style={{color:dureeMin<=120?"#22c55e":"#ef4444"}}>{dureeMin} minutes</b></div>}
    {ok!==null&&<SmConf ok={ok}/>}
    <FB label="Agent"><ChipR opts={agents||AGENTS_DEFAULT} active={agent} onChange={setAgent}/></FB>
    <SC onSave={()=>onSave({...item,produit,qte,tDepart:parseFloat(tDepart),tFin:tFin?tFinV:item.tFin,dureeMin,ok:tFin?ok:item.ok,agent})} onClose={onClose}/>
  </>);
}
function Timer({tsDebut}){
  const [elapsed,setElapsed]=useState(0);
  useEffect(()=>{ const c=()=>setElapsed(Math.floor((Date.now()-new Date(tsDebut))/60000)); c(); const i=setInterval(c,15000); return()=>clearInterval(i); },[tsDebut]);
  const over=elapsed>120; const warn=elapsed>=90;
  return(
    <div style={{marginTop:10,display:"flex",alignItems:"center",gap:10}}>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:26,fontWeight:700,color:over?"#ef4444":warn?"#f59e0b":"#22c55e"}}>{elapsed}min</div>
      <div style={{flex:1,height:12,background:"#1e293b",borderRadius:6,overflow:"hidden"}}><div style={{height:"100%",borderRadius:6,background:over?"#ef4444":warn?"#f59e0b":"#22c55e",width:`${Math.min(100,elapsed/120*100)}%`,transition:"width .5s"}}/></div>
      <div style={{fontSize:13,color:"#94a3b8",fontWeight:700}}>/ 120min</div>
      {over&&<div style={{fontSize:13,color:"#dc2626",fontWeight:900}}>⚠ DÉPASSÉ</div>}
    </div>
  );
}

// ══════════════════════════════════════════════
// MODULE RÉCEPTION
// ══════════════════════════════════════════════
function ModuleNC({ncs,onSave,autoOpen,agents}){
  const [showForm,setShowForm]=useState(false);
  const [edit,setEdit]=useState(null);
  const [cat,setCat]=useState(CATEGORIES_NC[0]);
  const [desc,setDesc]=useState("");
  const [action,setAction]=useState("");
  const [agent,setAgent]=useState((agents||AGENTS_DEFAULT)[0]);
  const [flash,setFlash]=useState(false);
  const [showArchives,setShowArchives]=useState(false);

  useEffect(()=>{ if(autoOpen) setShowForm(true); },[autoOpen]);

  const submit=async()=>{
    if(!desc) return;
    await onSave([...ncs,{id:Date.now(),ts:ts(),categorie:cat,description:desc,action,agent,statut:"Ouvert"}]);
    setDesc(""); setAction(""); setShowForm(false); setFlash(true); setTimeout(()=>setFlash(false),3000);
  };
  const saveEdit=async(upd)=>{ await onSave(ncs.map(n=>n.id===upd.id?upd:n)); setEdit(null); };
  const toggle=async(id)=>onSave(ncs.map(n=>n.id===id?{...n,statut:n.statut==="Ouvert"?"Clôturé":"Ouvert"}:n));
  const archiver=async(id)=>{ if(window.confirm("Archiver ce signalement ? Il sera masqué mais conservé.")) await onSave(ncs.map(n=>n.id===id?{...n,statut:"Archivé"}:n)); };
  const del=async(id)=>{ if(window.confirm("Supprimer ce signalement ?")) await onSave(ncs.filter(n=>n.id!==id)); };
  const csv=()=>dlCSV(ncs.map(n=>({"Date":fDate(n.ts),"Heure":fTime(n.ts),"Catégorie":n.categorie,"Description":n.description,"Action corrective":n.action,"Agent":n.agent,"Statut":n.statut})),`nonconformites_${new Date().toISOString().slice(0,10)}.csv`);
  const ouvertes=ncs.filter(n=>n.statut==="Ouvert");
  const cloturees=ncs.filter(n=>n.statut==="Clôturé");
  const archivees=ncs.filter(n=>n.statut==="Archivé");
  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <R2><span style={{fontSize:28,fontWeight:900,color:"#1e293b"}}>⚠️ Problèmes signalés</span><button className="btnS" onClick={csv}>↓ CSV</button></R2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {[{label:"Ouverts",v:ouvertes.length,color:"#dc2626",bg:ouvertes.length>0?"#fef2f2":"#ffffff"},{label:"Résolus",v:cloturees.length,color:"#16a34a",bg:"#ffffff"}].map(({label,v,color,bg})=>(
          <div key={label} style={{background:bg,border:`2px solid ${v>0&&label==="Ouverts"?"#ef4444":"#1e293b"}`,borderRadius:14,padding:16,textAlign:"center"}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:44,fontWeight:700,color,lineHeight:1}}>{v}</div>
            <div style={{fontSize:14,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.5,fontWeight:700,marginTop:4}}>{label}</div>
          </div>
        ))}
      </div>
      {!showForm?(
        <button className="btnP" onClick={()=>setShowForm(true)} style={{background:flash?"#22c55e":"#ef4444",color:"#fff"}}>
          {flash?"✅ Signalement enregistré !":"⚠️ Signaler un problème"}
        </button>
      ):(
        <div className="card" style={{display:"flex",flexDirection:"column",gap:16,border:"2px solid #f59e0b33"}}>
          <div style={{fontSize:20,fontWeight:900,color:"#f59e0b",letterSpacing:.5}}>⚠️ NOUVEAU PROBLÈME</div>
          <FB label="Type de problème">
            <select className="ifield" value={cat} onChange={e=>setCat(e.target.value)}>{CATEGORIES_NC.map(c=><option key={c} value={c}>{c}</option>)}</select>
          </FB>
          <FB label="Description précise" sub="Quoi ? Où ? Quand ? Dans quel contexte ?">
            <textarea className="ifield" rows={3} value={desc} onChange={e=>setDesc(e.target.value)} placeholder="ex. Frigo 2 à +7°C constaté à 10h30 lors du relevé d'ouverture. Produits laitiers présents..."/>
          </FB>
          <FB label="Ce qui a été fait pour corriger">
            <textarea className="ifield" rows={2} value={action} onChange={e=>setAction(e.target.value)} placeholder="ex. Produits transférés en Frigo 1. Technicien appelé. Frigo mis hors service..."/>
          </FB>
          <FB label="Qui signale ?"><ChipR opts={agents||AGENTS_DEFAULT} active={agent} onChange={setAgent}/></FB>
          <div style={{display:"flex",gap:12}}>
            <button onClick={()=>setShowForm(false)} style={{flex:1,padding:"14px",background:"transparent",border:"2px solid #2d3748",borderRadius:12,color:"#64748b",fontFamily:"inherit",fontSize:16,cursor:"pointer",fontWeight:700}}>Annuler</button>
            <button className="btnP" style={{flex:2}} onClick={submit} disabled={!desc}>💾 Enregistrer</button>
          </div>
        </div>
      )}
      {ouvertes.length>0&&(
        <>
          <div style={{fontSize:13,color:"#dc2626",textTransform:"uppercase",letterSpacing:1.5,fontWeight:900}}>● Problèmes ouverts ({ouvertes.length})</div>
          {ouvertes.map(n=><NCRow key={n.id} n={n} onToggle={toggle} onEdit={()=>setEdit(n)} onDel={()=>del(n.id)}/>)}
        </>
      )}
      {cloturees.length>0&&(
        <>
          <div style={{fontSize:13,color:"#16a34a",textTransform:"uppercase",letterSpacing:1.5,fontWeight:900}}>✓ Problèmes résolus ({cloturees.length})</div>
          {cloturees.slice().reverse().map(n=><NCRow key={n.id} n={n} onToggle={toggle} onEdit={()=>setEdit(n)} onDel={()=>del(n.id)} onArchive={archiver}/>)}
        </>
      )}
      {archivees.length>0&&(
        <>
          <button onClick={()=>setShowArchives(!showArchives)} style={{background:"transparent",border:"1px solid #e2e8f0",borderRadius:10,padding:"10px 14px",color:"#94a3b8",fontFamily:"inherit",fontSize:13,fontWeight:700,cursor:"pointer",width:"100%",textAlign:"left"}}>
            {showArchives?"▾":"▸"} Archives ({archivees.length} signalement{archivees.length>1?"s":""})
          </button>
          {showArchives&&archivees.slice().reverse().map(n=><NCRow key={n.id} n={n} onToggle={toggle} onEdit={()=>setEdit(n)} onDel={()=>del(n.id)}/>)}
        </>
      )}
      {edit&&<Modal title="✏️ Modifier ce signalement" onClose={()=>setEdit(null)}><EditNC item={edit} agents={agents} onSave={saveEdit} onClose={()=>setEdit(null)}/></Modal>}
    </div>
  );
}
function NCRow({n,onToggle,onEdit,onDel,onArchive}){
  const open=n.statut==="Ouvert";
  return(
    <div style={{background:"#ffffff",border:`2px solid ${open?"#ef4444":"#1e293b"}`,borderLeft:`6px solid ${open?"#ef4444":"#22c55e"}`,borderRadius:14,padding:14,marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>

// ══════ VUE SYNTHÈSE SEMAINE ══════════════════
function ModuleSemaine({temps,huiles,services,nettoyages,ncs}){
  // Générer les 7 derniers jours de cuisine
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i); d.setHours(12,0,0,0);
    days.push(kitchenDay(d));
  }
  const pndJour=(pndLoad()||PND_DEFAULT).filter(p=>p.freq==="Journalier");

  const statForDay=(day)=>{
    const tD=temps.filter(t=>kitchenDay(new Date(t.ts))===day);
    const sD=services.filter(s=>kitchenDay(new Date(s.ts))===day);
    const hD=huiles.filter(h=>kitchenDay(new Date(h.ts))===day);
    const nD=nettoyages.filter(n=>kitchenDay(new Date(n.ts))===day);
    const ncD=ncs.filter(n=>kitchenDay(new Date(n.ts))===day&&n.statut==="Ouvert");
    const pndDoneD=pndJour.filter(p=>nD.some(n=>n.tacheId===p.id));
    const tKO=tD.filter(t=>t.ok===false).length;
    const sKO=sD.filter(s=>s.ok===false).length;
    return {
      tCount:tD.length, tKO,
      sCount:sD.length, sKO,
      hCount:hD.length,
      pndPct:pndJour.length>0?Math.round(pndDoneD.length/pndJour.length*100):null,
      ncCount:ncD.length,
      isEmpty:tD.length===0&&sD.length===0&&hD.length===0,
    };
  };

  const JOURS=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
  const today=todayS();

  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{fontSize:28,fontWeight:900,color:"#1e293b"}}>📅 Synthèse semaine</div>
      <div style={{fontSize:13,color:"#64748b"}}>Vue des 7 derniers jours — vérifier les jours incomplets.</div>

      {days.map(day=>{
        const d=new Date(day);
        const isToday=day===today;
        const st=statForDay(day);
        const nomJour=JOURS[d.getDay()];
        const numJour=d.getDate();
        const hasProb=st.tKO>0||st.sKO>0||st.ncCount>0||(st.pndPct!==null&&st.pndPct<100);
        const statusColor=st.isEmpty?"#94a3b8":hasProb?"#ef4444":"#22c55e";
        const statusBg=st.isEmpty?"#f8fafc":hasProb?"#fef2f2":"#f0fdf4";
        return(
          <div key={day} style={{background:statusBg,border:`2px solid ${isToday?"#f59e0b":statusColor}`,borderRadius:14,padding:14,position:"relative"}}>
            {isToday&&<div style={{position:"absolute",top:-10,left:16,background:"#f59e0b",color:"#1e293b",fontSize:11,fontWeight:900,padding:"2px 10px",borderRadius:8,textTransform:"uppercase",letterSpacing:1}}>Aujourd'hui</div>}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:st.isEmpty?0:10}}>
              <div>
                <span style={{fontSize:20,fontWeight:900,color:"#1e293b"}}>{nomJour} {numJour}</span>
                <span style={{fontSize:13,color:"#64748b",marginLeft:8}}>{d.toLocaleDateString("fr-FR",{month:"short"})}</span>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                {st.isEmpty?(
                  <span style={{fontSize:13,color:"#94a3b8",fontWeight:600}}>Aucune saisie</span>
                ):(
                  <div style={{width:10,height:10,borderRadius:"50%",background:statusColor}}/>
                )}
              </div>
            </div>
            {!st.isEmpty&&(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                {[
                  {icon:"🌡",label:"T° frigos",   v:st.tCount, ko:st.tKO,   req:2},
                  {icon:"🔥",label:"T° service",  v:st.sCount, ko:st.sKO,   req:1},
                  {icon:"⚗", label:"Huile",       v:st.hCount, ko:0,         req:1},
                  {icon:"🧹",label:"Ménage",       v:st.pndPct!==null?st.pndPct+"%":"—", ko:st.pndPct!==null&&st.pndPct<100?1:0, req:null},
                ].map(({icon,label,v,ko,req})=>{
                  const warn=ko>0||(req&&typeof v==="number"&&v<req);
                  return(
                    <div key={label} style={{background:"rgba(255,255,255,.7)",borderRadius:9,padding:"8px 10px",display:"flex",alignItems:"center",gap:7}}>
                      <span style={{fontSize:16}}>{icon}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,color:"#64748b",fontWeight:600}}>{label}</div>
                        <div style={{fontSize:15,fontWeight:800,color:warn?"#dc2626":"#15803d"}}>{typeof v==="number"?v:v}{req&&typeof v==="number"?<span style={{fontSize:11,color:"#94a3b8",fontWeight:500}}>/{req}</span>:null}</div>
                      </div>
                      {warn&&<span style={{fontSize:14}}>⚠</span>}
                    </div>
                  );
                })}
                {st.ncCount>0&&(
                  <div style={{gridColumn:"1/-1",background:"#fef2f2",borderRadius:9,padding:"8px 10px",display:"flex",alignItems:"center",gap:7}}>
                    <span style={{fontSize:16}}>⚠️</span>
                    <div style={{fontSize:14,fontWeight:700,color:"#dc2626"}}>{st.ncCount} non-conformité{st.ncCount>1?"s":""} ouverte{st.ncCount>1?"s":""}</div>
                  </div>
                )}
              </div>
            )}
          </div>
        );
      })}

      <div style={{background:"#f0f7ff",border:"1px solid #bfdbfe",borderRadius:12,padding:"10px 14px",fontSize:13,color:"#1d4ed8",lineHeight:1.7}}>
        <b>Lecture :</b> 🟢 Tout bon · 🔴 Manques ou NC · ⚪ Aucune saisie ce jour
      </div>
    </div>
  );
}

// ── Section Plan de Nettoyage ──
function SettingsPnd({pndPlan,onSave}){
  const [zone,setZone]=useState(""); const [tache,setTache]=useState("");
  const [freq,setFreq]=useState("Journalier"); const [moment,setMoment]=useState("");
  const [produit,setProduit]=useState(""); const [dilution,setDilution]=useState("");
  const [flash,setFlash]=useState(""); const [showForm,setShowForm]=useState(false);
  const add=()=>{
    const z=zone.trim(); const t=tache.trim(); if(!z||!t) return;
    const newT={id:"t_"+Date.now(),zone:z,tache:t,freq,moment:moment||freq,produit:produit||"—",dilution:dilution||"—"};
    onSave([...pndPlan,newT]); setZone(""); setTache(""); setMoment(""); setProduit(""); setDilution("");
    setShowForm(false); setFlash("✓ Tâche ajoutée !"); setTimeout(()=>setFlash(""),2000);
  };
  const rm=(id)=>{ if(window.confirm("Supprimer cette tâche ?")) onSave(pndPlan.filter(t=>t.id!==id)); };
  const FREQS=["Journalier","Hebdomadaire","Mensuel"];
  return(<div style={{display:"flex",flexDirection:"column",gap:10}}>
    <div style={{fontSize:13,color:"#64748b"}}>Toutes les tâches de votre plan de nettoyage et désinfection.</div>
    {FREQS.map(f=>{
      const taches=pndPlan.filter(t=>t.freq===f);
      return taches.length>0?(
        <div key={f}>
          <div style={{fontSize:13,fontWeight:900,color:f==="Journalier"?"#b45309":f==="Hebdomadaire"?"#1d4ed8":"#7c3aed",textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>{f} ({taches.length})</div>
          {taches.map(t=>(
            <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:11,padding:"10px 14px",marginBottom:6}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,color:"#1e293b"}}>{t.zone} — {t.tache}</div>
                <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{t.moment} · {t.produit} ({t.dilution})</div>
              </div>
              <button onClick={()=>rm(t.id)} style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:7,padding:"4px 10px",color:"#dc2626",fontFamily:"inherit",fontSize:12,fontWeight:800,cursor:"pointer",flexShrink:0,marginLeft:8}}>✕</button>
            </div>
          ))}
        </div>
      ):null;
    })}
    {flash&&<div style={{fontSize:14,fontWeight:800,color:"#22c55e",textAlign:"center"}}>{flash}</div>}
    {!showForm?(
      <button onClick={()=>setShowForm(true)} style={{background:"#f59e0b",border:"none",borderRadius:12,padding:"14px",color:"#1e293b",fontFamily:"inherit",fontSize:16,fontWeight:900,cursor:"pointer"}}>+ Ajouter une tâche</button>
    ):(
      <div className="card" style={{display:"flex",flexDirection:"column",gap:10}}>
        <div style={{fontSize:14,fontWeight:900,color:"#b45309",textTransform:"uppercase"}}>Nouvelle tâche</div>
        <FB label="Zone / équipement"><input className="ifield" value={zone} onChange={e=>setZone(e.target.value)} placeholder="ex. Plancha, Frigos, Bar..."/></FB>
        <FB label="Description de la tâche"><input className="ifield" value={tache} onChange={e=>setTache(e.target.value)} placeholder="ex. Nettoyage et désinfection..."/></FB>
        <FB label="Fréquence">
          <ChipR opts={["Journalier","Hebdomadaire","Mensuel"]} active={freq} onChange={setFreq}/>
        </FB>
        <FB label="Moment (optionnel)"><input className="ifield" value={moment} onChange={e=>setMoment(e.target.value)} placeholder="ex. Clôture service, Lundi matin..."/></FB>
        <FB label="Produit utilisé (optionnel)"><input className="ifield" value={produit} onChange={e=>setProduit(e.target.value)} placeholder="ex. Détergent désinfectant"/></FB>
        <FB label="Dilution (optionnel)"><input className="ifield" value={dilution} onChange={e=>setDilution(e.target.value)} placeholder="ex. Dilué 2%, Prêt à l'emploi"/></FB>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setShowForm(false)} style={{flex:1,padding:"12px",background:"transparent",border:"1px solid #e2e8f0",borderRadius:10,color:"#94a3b8",fontFamily:"inherit",fontSize:15,cursor:"pointer",fontWeight:700}}>Annuler</button>
          <button onClick={add} disabled={!zone.trim()||!tache.trim()} style={{flex:2,background:"#22c55e",border:"none",borderRadius:12,padding:"14px",color:"#fff",fontFamily:"inherit",fontSize:16,fontWeight:900,cursor:"pointer"}}>💾 Ajouter</button>
        </div>
      </div>
    )}
    <button onClick={()=>{ if(window.confirm("Remettre le plan par défaut ? Vos tâches personnalisées seront perdues.")) onSave(PND_DEFAULT); }} style={{background:"transparent",border:"1px solid #e2e8f0",borderRadius:10,padding:"10px",color:"#94a3b8",fontFamily:"inherit",fontSize:13,cursor:"pointer",fontWeight:700}}>↺ Remettre le plan par défaut</button>
  </div>);
}

// ══════════════════════════════════════════════
// COMPOSANTS PARTAGÉS
// ══════════════════════════════════════════════
function Modal({title,children,onClose}){
  return(
    <div className="overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal">
        <div className="modalHandle"/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div style={{fontSize:20,fontWeight:900,color:"#f59e0b",letterSpacing:.5}}>{title}</div>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:"#94a3b8",fontSize:28,cursor:"pointer",lineHeight:1,padding:"0 4px",minWidth:40,minHeight:40}}>✕</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>{children}</div>
      </div>
    </div>
  );
}
function TBar({opts,active,onChange}){
  return(
    <div style={{display:"flex",background:"#ffffff",borderRadius:14,padding:5,gap:5,border:"1px solid #e2e8f0",overflowX:"auto"}}>
      {opts.map(o=><button key={o.id} onClick={()=>onChange(o.id)} style={{flex:"0 0 auto",padding:"12px 14px",border:"none",borderRadius:10,background:active===o.id?"#f59e0b":"transparent",color:active===o.id?"#1e293b":"#94a3b8",fontFamily:"inherit",fontWeight:800,fontSize:14,cursor:"pointer",textTransform:"uppercase",letterSpacing:.3,whiteSpace:"nowrap",minHeight:46}}>{o.label}</button>)}
    </div>
  );
}
function FB({label,sub,children}){
  return(
    <div>
      <label className="fieldLabel">{label}</label>
      {sub&&<div className="subLabel">{sub}</div>}
      {children}
    </div>
  );
}
function ChipR({opts,active,onChange,colorMap}){
  return(<div style={{display:"flex",gap:10,flexWrap:"wrap"}}>{opts.map(o=>{ const cls=colorMap?.[o]; return <button key={o} onClick={()=>onChange(o)} className={`chip${active===o?(cls?" "+cls:" on"):""}`} style={{flex:1,minWidth:70}}>{o}</button>; })}</div>);
}
function DecBanner({d}){
  return(<div style={{background:DCOL_BG[d],border:`2px solid ${DCOL[d]}`,borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
    <span style={{fontSize:26}}>{d==="Maintien"?"✅":d==="Surveiller"?"⚠️":"🚨"}</span>
    <div>
      <div style={{fontWeight:900,color:DCOL[d],fontSize:17}}>{d.toUpperCase()}</div>
      {d==="Changement immédiat"&&<div style={{fontSize:14,color:"#dc2626",marginTop:2}}>Vidanger, nettoyer, remplacer l'huile immédiatement</div>}
      {d==="Surveiller"&&<div style={{fontSize:14,color:"#92400e",marginTop:2}}>Dégradation détectée — prévoir le changement</div>}
      {d==="Maintien"&&<div style={{fontSize:14,color:"#15803d",marginTop:2}}>Huile conforme ✓</div>}
    </div>
  </div>);
}
function ConfBanner({ok,detail,bad,good}){
  return(<div style={{background:ok?"#f0fdf4":"#fef2f2",border:`2px solid ${ok?"#22c55e":"#ef4444"}`,borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"flex-start",gap:12}}>
    <span style={{fontSize:26,flexShrink:0}}>{ok?"✅":"🚨"}</span>
    <div>
      <div style={{fontWeight:900,color:ok?"#22c55e":"#ef4444",fontSize:16}}>{ok?"CONFORME ✓":"NON CONFORME — AGIR !"}</div>
      {detail&&<div style={{fontSize:14,color:"#64748b",marginTop:3}}>{detail}</div>}
      {!ok&&bad&&<div style={{fontSize:14,color:"#dc2626",marginTop:4,fontWeight:700}}>{bad}</div>}
      {ok&&good&&<div style={{fontSize:14,color:"#15803d",marginTop:4,fontWeight:700}}>{good}</div>}
    </div>
  </div>);
}
function SmConf({ok}){ return <div style={{fontSize:15,fontWeight:800,color:ok?"#22c55e":"#ef4444",padding:"8px 14px",background:ok?"#f0fdf4":"#fef2f2",borderRadius:10}}>{ok?"✅ CONFORME":"🚨 NON CONFORME"}</div>; }
function ABtns({onEdit,onDel}){
  return(<div style={{display:"flex",flexDirection:"column",gap:7,flexShrink:0,paddingTop:2}}>
    <button className="btnEdit" onClick={onEdit}>✏ Modifier</button>
    <button className="btnDel"  onClick={onDel}>✕</button>
  </div>);
}
function SC({onSave,onClose,disabled}){
  return(<div style={{display:"flex",gap:12,marginTop:8}}>
    <button onClick={onClose} style={{flex:1,padding:"14px",background:"transparent",border:"2px solid #2d3748",borderRadius:12,color:"#64748b",fontFamily:"inherit",fontSize:16,cursor:"pointer",fontWeight:700,minHeight:52}}>Annuler</button>
    <button className="btnP" style={{flex:2}} onClick={onSave} disabled={disabled}>💾 Sauvegarder</button>
  </div>);
}
function R2({children}){ return <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>{children}</div>; }
function Dot({ok}){ return <div style={{width:10,height:10,borderRadius:"50%",background:ok?"#22c55e":"#ef4444",flexShrink:0,boxShadow:ok?"0 0 4px #22c55e":"0 0 4px #ef4444"}}/>; }
function Empty(){ return <div style={{color:"#94a3b8",textAlign:"center",padding:"24px",fontSize:16}}>Aucune donnée enregistrée</div>; }

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
